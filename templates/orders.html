<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f1f3f6;
        }

        .order-card{
            background:white;
            border-radius:15px;
            padding:20px;
            margin-bottom:20px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .order-card:hover{
            transform:translateY(-3px);
            transition:0.3s;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#2874f0;">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🛒 Jahnavi Store
        </a>

        <div>
            <a href="/" class="btn btn-light">
                Home
            </a>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">
        📦 My Orders
    </h1>

    {% if orders %}

        {% for order in orders %}

            <div class="order-card">

                <h4>
                    Order #{{ order.id }}
                </h4>

                <p>
                    <strong>Total:</strong>
                    ₹{{ order.total_amount }}
                </p>

                <p>
                    <strong>Date:</strong>
                    {{ order.created_at }}
                </p>

            </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-info">
            You have not placed any orders yet.
        </div>

    {% endif %}

</div>

</body>
</html>
